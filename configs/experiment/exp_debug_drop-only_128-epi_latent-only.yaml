# 顶层实验配置。
# 当前由 scripts/train.py、scripts/evaluate.py、scripts/sanity_check_env.py、
# scripts/debug_single_rollout.py、scripts/debug_calibrator.py 共同读取。

# 实验名。训练输出会写到 logging.log_dir/<name>/ 下。
name: drop-only_128-epi_latent-only

# 实验随机种子。train/evaluate 脚本会优先用这里的值。
seed: 7

# 训练对象范围（闭区间）。这些 object 参与 on-policy rollout 和参数更新。
train_object_id_range: [0, 74]

# holdout 对象范围（闭区间）。先按 split_seed 打乱，再切成 val/test。
holdout_object_id_range: [75, 87]

# holdout 切分随机种子。默认若省略，则回退到 experiment.seed。
split_seed: 7

# holdout 中分给 validation 的 object 数量。
# 若和 val_object_ratio 同时设置，优先使用这个字段。
val_object_count: 4

# holdout 中 validation 占比。当前默认关闭，改用 val_object_count。
val_object_ratio:

# 训练迭代数。当前 train.py -> Trainer.train() 直接读取。
num_iterations: 500

# 机制消融 preset。由 apply_experiment_overrides() 展开到 env/model/calibration。
ablation:
  id: baseline 
  # 后续 grasp_refine_env_drop_only内部会关闭其他reward

# 多 worker 异步训练时，每隔多少轮在 collect 前重建一次 worker scene。
# 0 表示不重建；1 表示从 iteration 1 开始每轮都重建。
scene_rebuild_every_n_iterations: 0

# 多 worker collector 中，每隔多少轮在 collect 前主动回收最老的 worker。
# 0 表示关闭；N>0 表示当 iteration % N == 0 时触发 recycle。
worker_recycle_every_n_iterations: 1

# 每次 recycle event 替换多少个最老的 worker slot。
worker_recycle_slots_per_event: 2

# 是否在当前 collect 期间后台预热下一轮要替换的 standby worker。
worker_recycle_enable_standby_prefetch: true

# 最多同时预热多少个 standby worker。
worker_recycle_prefetch_count: 2

validation:
  enabled: true
  every_n_iterations: 3
  num_workers: 8
  num_episodes: 384
  worker_recycle_every_n_iterations: 1
  worker_recycle_slots_per_event: 2
  worker_recycle_enable_standby_prefetch: true
  worker_recycle_prefetch_count: 2

configs:
  # 环境主配置路径。build_env() 会消费其中的大部分字段。
  env: configs/env/grasp_refine_env_drop_only.yaml

  # perception 主配置路径。当前真实生效的是这个文件里的 backbone/predictor 段。
  perception: configs/perception/perception.yaml

  # calibrator 配置路径。由 OnlineLogitCalibrator 读取。
  calibration: configs/calibration/online_calibrator_off.yaml

  # PPO / Trainer 配置路径。由 PPOAgent 和 Trainer 读取。
  rl: configs/rl/ppo_128_epi.yaml

  # actor-critic 网络配置路径。当前 build_actor_critic() 直接消费。
  actor_critic: configs/model/actor_critic_latent_only.yaml

logging:
  # 训练输出根目录。实际产物会写到 log_dir/<name>/ 下。
  log_dir: outputs/exp_debug

  # 日志指标裁剪策略。paper 表示仅保留论文相关学习指标和最小训练健康指标。
  metric_profile: paper

  diagnostics:
    enabled: false

  # checkpoint 根目录。实际会写到 checkpoint_dir 的同级 <name>/checkpoints/ 下。
  checkpoint_dir: outputs/exp_debug/checkpoints

  tensorboard:
    enabled: true
    dir: outputs/exp_debug/tensorboard

  sample_metrics:
    enabled: false
    path: outputs/exp_debug/episode_metrics.jsonl
    every_n_iterations: 10

  best_checkpoint:
    enabled: true
    metric: validation/outcome/success_lift_vs_dataset
    mode: max
    filename: best.pt
