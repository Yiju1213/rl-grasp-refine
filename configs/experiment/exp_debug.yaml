# 顶层实验配置。
# 当前由 scripts/train.py、scripts/evaluate.py、scripts/sanity_check_env.py、
# scripts/debug_single_rollout.py、scripts/debug_calibrator.py 共同读取。

# 实验名。训练输出会写到 logging.log_dir/<name>/ 下。
name: reward-group-a_paper-spec

# 实验随机种子。train/evaluate 脚本会优先用这里的值。
seed: 7

# 训练迭代数。当前 train.py -> Trainer.train() 直接读取。
num_iterations: 150

configs:
  # 环境主配置路径。build_env() 会消费其中的大部分字段。
  env: configs/env/grasp_refine_env.yaml

  # perception 主配置路径。当前真实生效的是这个文件里的 backbone/predictor 段。
  perception: configs/perception/perception.yaml

  # calibrator 配置路径。由 OnlineLogitCalibrator 读取。
  calibration: configs/calibration/online_calibrator.yaml

  # PPO / Trainer 配置路径。由 PPOAgent 和 Trainer 读取。
  rl: configs/rl/ppo.yaml

  # actor-critic 网络配置路径。当前 build_actor_critic() 直接消费。
  actor_critic: configs/model/actor_critic.yaml

logging:
  # 训练输出根目录。实际产物会写到 log_dir/<name>/ 下。
  log_dir: outputs/exp_debug

  # checkpoint 根目录。实际会写到 checkpoint_dir 的同级 <name>/checkpoints/ 下。
  checkpoint_dir: outputs/exp_debug/checkpoints

  tensorboard:
    enabled: true
    dir: outputs/exp_debug/tensorboard

  sample_metrics:
    enabled: false
    path: outputs/exp_debug/episode_metrics.jsonl
    every_n_iterations: 10

  best_checkpoint:
    enabled: true
    metric: outcome/success_rate_live_after
    mode: max
    filename: best.pt
