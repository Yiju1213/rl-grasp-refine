# PPO / Trainer 配置。
# 当前主要由：
# - src/rl/trainer.py
# - src/rl/ppo_agent.py
# - scripts/train.py
# 直接消费。

# 训练设备。主进程 PPO update 默认走 GPU。
device: cuda:0

# worker 侧 policy/value 推理设备。
# 未显式设置时，collector 会回退到 device。
worker_policy_device: cuda:0

# 每个 iteration 要收集多少个 episode。
# 在 single-step 设定下，也可以理解为每轮 PPO update 的样本数。
batch_episodes: 96

# 折扣因子。Trainer -> compute_returns_and_advantages() 使用。
gamma: 0.99

# GAE 的 lambda。Trainer -> compute_returns_and_advantages() 使用。
lam: 0.95

# Adam 学习率。当前 train.py 在构造 optimizer 时使用。
learning_rate: 0.0003

# PPO clipped objective 的截断范围。
clip_range: 0.2

# value loss 的权重。
value_loss_coef: 0.5

# entropy bonus 的权重。越大，探索倾向越强。
entropy_coef: 0.01

# 每轮 rollout 上进行多少个 PPO epoch。
update_epochs: 4

# PPO 更新时的 mini-batch 大小。
# 如果大于当前 batch_size，代码里会自动截成 batch_size。
minibatch_size: 16

# 梯度裁剪上限。
max_grad_norm: 0.5

# 是否对 advantage 做标准化。
normalize_advantages: true

# rollout 收集时，最多允许尝试多少倍的无效 episode。
max_collect_attempt_factor: 10

# worker 数量。>1 时会启用 spawn 型异步 rollout collector。
num_envs: 11
