# 预留的 backbone 拆分配置文件。
# 注意：当前脚本虽然会把它读进 experiment bundle，但并不会直接消费它；
# 当前真正生效的是 configs/perception/perception.yaml 里的 backbone 段。

# 期望的 backbone 类型。
# 当前代码没有直接读取这个字段；真正选 SGAGSN / DGCNN 的逻辑由 perception.adapter_type 控制。
type: sga_gsn

# 期望的 latent 特征维度。
# 当前这个文件未直接生效，但同名字段在 perception.yaml 的 backbone.latent_dim 会影响 obs_dim 和模型输出。
latent_dim: 32

# 期望的 backbone 隐藏层宽度。
# 当前这个文件未直接生效；真实生效值来自 perception.yaml 的 backbone.hidden_dim。
hidden_dim: 64
