# actor-critic 网络配置。
# 当前由 scripts/_common.py -> build_actor_critic() 传入：
# - PolicyNetwork
# - ValueNetwork

# policy MLP 的隐藏层宽度列表。
policy_hidden_dims: [128, 128]

# value MLP 的隐藏层宽度列表。
value_hidden_dims: [128, 128]

# policy 高斯分布的初始 log_std。
# 值越大，初始探索越强；当前由 PolicyNetwork.log_std 初始化时读取。
initial_log_std: -0.5
