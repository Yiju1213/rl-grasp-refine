# perception 主配置。
# 当前由 scripts/_common.py -> build_env() -> build_perception_stack() 直接消费。

# 用哪个 adapter 族来决定输入适配方式。
# 当前：
# - "sga_gsn" -> SGAGSNAdapter + shared AdaPoinTr/SGSNet runtime
# - "dgcnn"   -> DGCNNAdapter + DGCNNEncoder
# 实际 backbone 选择优先看这个字段，而不是 backbone.type。
adapter_type: sga_gsn

feature_extractor:
  # 是否冻结 backbone 推理。
  # 当前 FeatureExtractor.extract() / StabilityPredictor.predict_logit() 在 freeze=true 时走 eval + no_grad。
  freeze: true

backbone:
  # 文档化字段。adapter_type=sga_gsn 时真实 feature dim 由下方 runtime config 决定。
  type: sga_gsn

  # 占位文档字段。对于真实 SGA-GSN 路径，obs dim 会读取运行时 config 对应的 body feature dim。
  latent_dim: 576

  # backbone 内部 MLP 的隐藏层宽度。
  hidden_dim: 64

predictor:
  # 文档化的 predictor 类型。
  # 当前 build_stability_predictor() 固定实例化 StabilityHead，没有按这个字段分支。
  type: stability_head

  # StabilityHead 内部隐藏层宽度。
  hidden_dim: 64

contact_semantics:
  # tactile 激活阈值。超过这个阈值的 contact 值会被视为 active contact。
  tactile_threshold: 0.2

  # edge proximity 的归一化尺度。
  # 距离越小，compute_edge_proximity() 输出越接近 1。
  edge_scale: 0.05

sga_gsn:
  runtime:
    source_root: /AdaPoinTr
    device: cuda:0
    config_path: /AdaPoinTr/experiments/VTG_PPCT/3D_VTG_models/PPCT_BCEonly_vtEncDrop_8Dep_Vds_FeatEx_LocalDensity_ValNoSC/config.yaml
    shape_checkpoint: /AdaPoinTr/ckpts/ap_ps55.pth
    grasp_checkpoint: /AdaPoinTr/experiments/VTG_PPCT/3D_VTG_models/PPCT_BCEonly_vtEncDrop_8Dep_Vds_FeatEx_LocalDensity_ValNoSC/ckpt-best.pth
    vis_points: 2048
    tac_points_per_side: 1200
    sc_input_points: 2048
    tactile_step: 8
    camera_distance_to_gel_m: 0.02315
    tactile_noise_eps: 0.0001
    seed: 7
